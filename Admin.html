<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#0f172a;
  color:white;
}

/* Sidebar */
.sidebar{
  width:230px;
  height:100vh;
  position:fixed;
  background:#111827;
  padding:20px;
}

.sidebar h2{text-align:center;margin-bottom:20px;}
.sidebar button{
  width:100%;
  margin:10px 0;
  padding:12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#1f2937;
  color:white;
  font-weight:bold;
}

/* Main */
.main{
  margin-left:250px;
  padding:30px;
}

.stat{
  background:#1f2937;
  padding:20px;
  border-radius:15px;
  margin:10px 0;
}

input{
  padding:10px;
  border:none;
  border-radius:8px;
  margin:5px 0;
  width:100%;
}

#winnerSection{
  margin-bottom:20px;
  font-size:18px;
}

/* Charts layout */
.chart-container{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:space-between;
}

.chart-box{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  flex:1 1 48%;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.chart-box canvas{
  width:100% !important;
  max-width:100%;
  height:300px !important;
}

/* Candidate list */
.candidate-card{
  background:#1e293b;
  padding:12px;
  border-radius:12px;
  margin:10px 0;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.candidate-card input{
  width:40%;
  margin:0 5px;
}

.candidate-card button{
  margin-left:5px;
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.edit-btn{background:#3b82f6;color:white;}
.save-btn{background:#10b981;color:white;}
.delete-btn{background:#ef4444;color:white;}

/* Mobile */
@media(max-width:768px){
  .main{
    margin-left:0;
    padding:15px;
  }
  .sidebar{
    display:none;
  }
  .chart-box{
    flex:1 1 100%;
  }
  .candidate-card{
    flex-direction:column;
    align-items:flex-start;
  }
  .candidate-card input{
    width:95%;
  }
}
</style>
</head>

<body>

<div class="sidebar">
<h2>Admin Panel</h2>
<button onclick="exportPDF()">Export Results (PDF)</button>
<button onclick="resetElection()">Reset Election</button>
<button onclick="logout()">Logout</button>
</div>

<div class="main">

<h1>Dashboard</h1>

<div id="winnerSection"></div>

<div class="stat">
<h3 id="totalVotes">0</h3>
<p>Total Votes</p>
</div>

<h3>Add Candidate</h3>
<input id="cname" placeholder="Name">
<input id="position" placeholder="Position">
<button onclick="addCandidate()">Add Candidate</button>

<h3>Candidate List (Edit/Delete)</h3>
<div id="candidateList"></div>

<h3>Live Results</h3>
<div class="chart-container">
  <div class="chart-box">
    <h4>Pie Chart</h4>
    <canvas id="pieChart"></canvas>
  </div>

  <div class="chart-box">
    <h4>Bar Graph</h4>
    <canvas id="barChart"></canvas>
  </div>
</div>

</div>

<script>
const { createClient } = supabase;
const supabaseClient = createClient(
  "https://zszelitgpvagfdhcruxd.supabase.co",
  "sb_publishable_9d2_0rVg3l6Goi143thMqA_R2Gb1R9M"
);

let pieChart, barChart;
let candidatesData=[], votesData=[];

/* ================= LOAD DASHBOARD ================= */
async function loadDashboard(){
  const {data:candidates} = await supabaseClient.from('candidates').select('*');
  const {data:votes} = await supabaseClient.from('votes').select('*');

  candidatesData = candidates;
  votesData = votes;

  totalVotes.innerText = votes.length;

  renderCharts(candidates,votes);
  calculateWinners(candidates,votes);
  renderCandidateList(candidates);
}

/* ================= MULTI-POSITION WINNERS ================= */
function calculateWinners(candidates,votes){
  let voteCount={};
  votes.forEach(v=>{
    voteCount[v.candidate_id]=(voteCount[v.candidate_id]||0)+1;
  });

  let grouped={};
  candidates.forEach(c=>{
    if(!grouped[c.position]) grouped[c.position]=[];
    grouped[c.position].push(c);
  });

  let html="<h3>🏆 Winners Per Position</h3>";

  for(let pos in grouped){
    let max=0;
    let winner="No Votes";

    grouped[pos].forEach(c=>{
      let count=voteCount[c.id]||0;
      if(count>max){
        max=count;
        winner=c.name+" ("+count+" votes)";
      }
    });

    html+=`<p><b>${pos}</b> → ${winner}</p>`;
  }

  winnerSection.innerHTML=html;
}

/* ================= RENDER BOTH CHARTS ================= */
function renderCharts(candidates,votes){
  let count={};
  votes.forEach(v=>{
    count[v.candidate_id]=(count[v.candidate_id]||0)+1;
  });

  const labels = candidates.map(c=>c.name);
  const data = candidates.map(c=>count[c.id]||0);

  if(pieChart) pieChart.destroy();
  if(barChart) barChart.destroy();

  pieChart = new Chart(document.getElementById('pieChart'), {
    type: 'pie',
    data: { labels, datasets: [{ data, backgroundColor: ["#3b82f6","#10b981","#ef4444","#f59e0b","#8b5cf6","#ec4899"] }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom'}} }
  });

  barChart = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: { labels, datasets:[{label:"Votes", data, backgroundColor:"#3b82f6"}] },
    options: { responsive:true, maintainAspectRatio:false, scales:{y:{beginAtZero:true}}, plugins:{legend:{display:false}} }
  });
}

/* ================= CANDIDATE CRUD ================= */
function renderCandidateList(candidates){
  const container = document.getElementById("candidateList");
  container.innerHTML="";
  candidates.forEach(c=>{
    const div = document.createElement("div");
    div.className="candidate-card";
    div.innerHTML=`
      <input type="text" value="${c.name}" disabled>
      <input type="text" value="${c.position}" disabled>
      <div>
        <button class="edit-btn" onclick="editCandidate('${c.id}',this)">Edit</button>
        <button class="save-btn" onclick="saveCandidate('${c.id}',this)" style="display:none">Save</button>
        <button class="delete-btn" onclick="deleteCandidate('${c.id}')">Delete</button>
      </div>
    `;
    container.appendChild(div);
  });
}

function editCandidate(id,btn){
  const parent = btn.closest(".candidate-card");
  const inputs = parent.querySelectorAll("input");
  inputs.forEach(i=>i.disabled=false);
  parent.querySelector(".save-btn").style.display="inline-block";
  btn.style.display="none";
}

async function saveCandidate(id,btn){
  const parent = btn.closest(".candidate-card");
  const inputs = parent.querySelectorAll("input");
  const name = inputs[0].value.trim();
  const position = inputs[1].value.trim();
  if(!name || !position){ alert("Enter Name and Position"); return; }

  await supabaseClient.from('candidates').update({name,position}).eq('id',id);

  inputs.forEach(i=>i.disabled=true);
  btn.style.display="none";
  parent.querySelector(".edit-btn").style.display="inline-block";
  loadDashboard();
}

async function deleteCandidate(id){
  if(confirm("Are you sure you want to delete this candidate?")){
    await supabaseClient.from('candidates').delete().eq('id',id);
    loadDashboard();
  }
}

/* ================= ADD CANDIDATE ================= */
async function addCandidate(){
  if(!cname.value || !position.value){ alert("Enter Name and Position"); return; }
  await supabaseClient.from('candidates').insert([{name:cname.value,position:position.value}]);
  cname.value=""; position.value="";
  loadDashboard();
}

/* ================= RESET ELECTION ================= */
async function resetElection(){
  if(confirm("Are you sure you want to reset the election? All votes will be deleted!")){
    // Delete all votes by using a condition that matches all valid UUIDs
    const { error } = await supabaseClient
      .from('votes')
      .delete()
      .gt('id', '00000000-0000-0000-0000-000000000000');

    if(error){
      alert("Error resetting election: " + error.message);
    } else {
      alert("Election reset successfully!");
      loadDashboard();
    }
  }
}



/* ================= EXPORT PDF ================= */
async function exportPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setFontSize(18);
  doc.text("Student Council Election Results",20,20);

  doc.setFontSize(12);
  doc.text("Date: "+new Date().toLocaleString(),20,30);

  let y=40;

  let voteCount={};
  votesData.forEach(v=>{
    voteCount[v.candidate_id]=(voteCount[v.candidate_id]||0)+1;
  });

  let grouped={};
  candidatesData.forEach(c=>{
    if(!grouped[c.position]) grouped[c.position]=[];
    grouped[c.position].push(c);
  });

  doc.text("Winners Per Position:",20,y);
  y+=10;

  for(let pos in grouped){
    let max=0;
    let winner="No Votes";
    grouped[pos].forEach(c=>{
      let count=voteCount[c.id]||0;
      if(count>max){
        max=count;
        winner=c.name+" ("+count+" votes)";
      }
    });
    doc.text(pos+" → "+winner,20,y);
    y+=8;
  }

  // Pie Chart
  const pieImg = document.getElementById("pieChart").toDataURL("image/png");
  doc.addImage(pieImg,"PNG",15,y+5,80,60);

  // Bar Chart
  const barImg = document.getElementById("barChart").toDataURL("image/png");
  doc.addImage(barImg,"PNG",110,y+5,80,60);

  doc.save("Election_Results.pdf");
}

/* ================= LOGOUT ================= */
function logout(){
  sessionStorage.clear();
  window.location="index.html";
}

/* Auto Refresh Dashboard every 5 seconds */
setInterval(loadDashboard,5000);
loadDashboard();
</script>
</body>
</html>
